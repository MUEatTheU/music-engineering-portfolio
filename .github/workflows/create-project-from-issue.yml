name: Create Project From Issue

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Project submission issue number"
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  create-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Fetch issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: gh issue view "$ISSUE_NUMBER" --json number,title,body,url > issue.json

      - name: Create project file
        env:
          GH_TOKEN: ${{ github.token }}
        run: ruby scripts/create_project_from_issue.rb issue.json

      - name: Push review branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH="automation/project-from-issue-${ISSUE_NUMBER}-${RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add _projects/*.md assets/images/projects/
          git diff --cached --quiet && {
            echo "No project file changes were generated."
            exit 1
          }
          git commit -m "Add project from submission issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "compare_url=https://github.com/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?quick_pull=1" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          COMPARE_URL: ${{ steps.branch.outputs.compare_url }}
        run: |
          cat > comment.md <<EOF
          Created a review branch for this submission.

          Open the compare page to create a pull request:
          $COMPARE_URL

          Maintainer checklist:
          - Confirm the downloaded thumbnail and project images look correct.
          - Confirm \`thumbnail_image\` points to the intended thumbnail.
          - Rearrange images in \`full_description\` if desired.
          - Preview the project page before merging.
          EOF
          gh issue comment "$ISSUE_NUMBER" --body-file comment.md
