name: Project submission
description: Submit a student project for the Music Engineering Portfolio.
title: "Project submission: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting your project. Fill out the fields below and attach all images you want included.

        You do not need to fork the repo or open a pull request.

        Important: drag image files into the Images box below. Do not use `assets/images/...` links inside this issue, because GitHub issues treat those as issue-page links and they will look broken.
  - type: input
    id: student_name
    attributes:
      label: Student name
      description: Use your full name as it should appear on the site.
      placeholder: Jane Smith
    validations:
      required: true
  - type: input
    id: student_slug
    attributes:
      label: Student slug
      description: Optional. Lowercase letters and hyphens only. If you leave this blank, the maintainer will create it from your name.
      placeholder: jane-smith
    validations:
      required: false
  - type: input
    id: project_title
    attributes:
      label: Project title
      placeholder: Real-Time Spectral Synthesizer
    validations:
      required: true
  - type: input
    id: course
    attributes:
      label: Course
      description: Optional. Use the course code if this project belongs to a class.
      placeholder: MUE410
    validations:
      required: false
  - type: dropdown
    id: category
    attributes:
      label: Project type
      options:
        - Research
        - Recording
        - Project
        - Capstone
        - Demo
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Add 2-5 short tags, separated by commas.
      placeholder: dsp, plugin, audio effects
    validations:
      required: true
  - type: input
    id: repo_url
    attributes:
      label: Repository URL
      placeholder: https://github.com/your-username/your-project
    validations:
      required: true
  - type: input
    id: demo_url
    attributes:
      label: Demo URL
      description: Optional. You can add a video, audio demo, or live demo link.
      placeholder: https://youtu.be/your-demo-video
    validations:
      required: false
  - type: textarea
    id: short_blurb
    attributes:
      label: Short blurb
      description: One sentence for the homepage project card.
      placeholder: A standalone real-time audio plugin designed for spectral gating.
    validations:
      required: true
  - type: textarea
    id: full_description
    attributes:
      label: Full description
      description: Describe what you made, why you made it, how it works, and what someone should notice. If you want an image placed somewhere, write a plain note like "put interface.png here" instead of using an assets/images link.
      placeholder: |
        This project explores...

        The main technical features are...

        Put interface.png here.

        The result sounds/works like...
    validations:
      required: true
  - type: input
    id: thumbnail_filename
    attributes:
      label: Thumbnail image filename
      description: Type the filename of the image that should be used as the homepage thumbnail.
      placeholder: my-project-cover.png
    validations:
      required: true
  - type: textarea
    id: images
    attributes:
      label: Images
      description: Drag and drop your thumbnail, screenshots, diagrams, or other images here. GitHub will create attachment links automatically.
      placeholder: |
        Drag image files into this box.

        Required: attach your thumbnail image.
        Optional: attach screenshots, diagrams, or other images.
    validations:
      required: true
  - type: textarea
    id: image_placement
    attributes:
      label: Image placement notes
      description: Optional. Tell the maintainer where each non-thumbnail image should appear.
      placeholder: |
        interface.png should appear after the paragraph about the UI.
        diagram.png should appear near the technical explanation.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Final checklist
      options:
        - label: I included all required project information.
          required: true
        - label: I attached a thumbnail image.
          required: true
        - label: My repository link works.
          required: true
